version: "3.9"

services:

  app:
    build: .
    container_name: insightpilot-app

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads
      - ./temp:/app/temp
      - ./database:/app/database

    depends_on:
      - redis

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: insightpilot-redis

    ports:
      - "6379:6379"

    restart: unless-stopped